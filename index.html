<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Unity WebGL Player | Kimi Hindernislauf</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <script src="TemplateData/UnityProgress.js"></script>
    <script src="Build/UnityLoader.js"></script>
    <script>
      var unityInstance;

      function emitKey(type, key) {
        var keyCodeMap = { ArrowUp: 38, ArrowDown: 40, ArrowLeft: 37, ArrowRight: 39 };
        var keyCode = keyCodeMap[key] || 0;
        var event = new KeyboardEvent(type, {
          key: key, code: key, keyCode: keyCode, which: keyCode,
          bubbles: true, cancelable: true
        });
        document.dispatchEvent(event);
        window.dispatchEvent(event);
      }

      function setupTouchControls() {
        if (!window.matchMedia("(hover: none) and (pointer: coarse)").matches) return;

        var container = document.getElementById("unityContainer");
        if (!container) return;

        var LONG_PRESS_MS = 250;
        var longPressTimer = null;
        var isLongPress = false;
        var isTouchActive = false;

        function isCanvasTarget(target) {
          return target && target.tagName === "CANVAS";
        }

        container.addEventListener("touchstart", function (e) {
          if (!isCanvasTarget(e.target)) return;
          e.preventDefault();
          isLongPress = false;
          isTouchActive = true;
          longPressTimer = setTimeout(function () {
            isLongPress = true;
            emitKey("keydown", "ArrowDown");
          }, LONG_PRESS_MS);
        }, { passive: false });

        container.addEventListener("touchend", function (e) {
          if (!isTouchActive) return;
          e.preventDefault();
          clearTimeout(longPressTimer);
          if (isLongPress) {
            emitKey("keyup", "ArrowDown");
          } else {
            emitKey("keydown", "ArrowUp");
            setTimeout(function () { emitKey("keyup", "ArrowUp"); }, 80);
          }
          isLongPress = false;
          isTouchActive = false;
        }, { passive: false });

        container.addEventListener("touchcancel", function () {
          if (!isTouchActive) return;
          clearTimeout(longPressTimer);
          if (isLongPress) emitKey("keyup", "ArrowDown");
          isLongPress = false;
          isTouchActive = false;
        });
      }

      function resizeUnityContainer() {
        var container = document.getElementById("unityContainer");
        if (!container) return;

        var fsEl = document.fullscreenElement ||
                   document.webkitFullscreenElement ||
                   document.mozFullScreenElement ||
                   document.msFullscreenElement;

        var viewport = window.visualViewport || { width: window.innerWidth, height: window.innerHeight };
        if (fsEl === container) {
          container.style.width = Math.round(viewport.width) + "px";
          container.style.height = Math.round(viewport.height) + "px";
          layoutUnityCanvas();
          return;
        }

        var baseWidth = 960;
        var baseHeight = 600;
        var ratio = baseWidth / baseHeight;
        var viewportWidth = Math.round(viewport.width);
        var viewportHeight = Math.round(viewport.height);
        var footer = document.querySelector(".footer");
        var footerHeight = footer ? footer.offsetHeight + 14 : 52;
        var maxWidth = Math.max(280, viewportWidth - 16);
        var maxHeight = Math.max(220, viewportHeight - footerHeight);

        var width = maxWidth;
        var height = Math.round(width / ratio);

        if (height > maxHeight) {
          height = maxHeight;
          width = Math.round(height * ratio);
        }

        container.style.width = width + "px";
        container.style.height = height + "px";
        layoutUnityCanvas();
      }

      function layoutUnityCanvas() {
        var container = document.getElementById("unityContainer");
        if (!container) return;

        var canvas = container.querySelector("canvas");
        if (!canvas) {
          window.requestAnimationFrame(layoutUnityCanvas);
          return;
        }

        var fsEl = document.fullscreenElement ||
                   document.webkitFullscreenElement ||
                   document.mozFullScreenElement ||
                   document.msFullscreenElement;

        var isMobile = window.matchMedia("(hover: none) and (pointer: coarse)").matches;
        var shouldLetterbox = isMobile || fsEl === container;

        if (!shouldLetterbox) {
          canvas.style.position = "";
          canvas.style.left = "";
          canvas.style.top = "";
          canvas.style.transform = "";
          canvas.style.width = "100%";
          canvas.style.height = "100%";
          return;
        }

        var baseRatio = 960 / 600;
        var availableWidth = container.clientWidth;
        var availableHeight = container.clientHeight;

        var width = availableWidth;
        var height = Math.round(width / baseRatio);
        if (height > availableHeight) {
          height = availableHeight;
          width = Math.round(height * baseRatio);
        }

        canvas.style.position = "absolute";
        canvas.style.left = "50%";
        canvas.style.top = "50%";
        canvas.style.transform = "translate(-50%, -50%)";
        canvas.style.width = width + "px";
        canvas.style.height = height + "px";
      }

      function startCanvasLayoutWatcher() {
        function tick() {
          layoutUnityCanvas();
          window.requestAnimationFrame(tick);
        }
        window.requestAnimationFrame(tick);
      }

      (function () {
        if (window.UnityLoader && UnityLoader.compatibilityCheck) {
          var _compatibilityCheck = UnityLoader.compatibilityCheck;
          UnityLoader.compatibilityCheck = function (instance, onSuccess, onError) {
            if (UnityLoader.SystemInfo && UnityLoader.SystemInfo.hasWebGL) {
              onSuccess();
              return;
            }
            return _compatibilityCheck.call(this, instance, onSuccess, onError);
          };
        }

        var _confirm = window.confirm;
        window.confirm = function (msg) {
          if (msg && (msg.indexOf("Unity WebGL") !== -1 || msg.indexOf("mobile") !== -1)) return true;
          return _confirm.apply(this, arguments);
        };
        var _alert = window.alert;
        window.alert = function (msg) {
          if (msg && (msg.indexOf("Unity WebGL") !== -1 || msg.indexOf("mobile") !== -1)) return;
          return _alert.apply(this, arguments);
        };
      })();

      document.addEventListener("DOMContentLoaded", function () {
        if (window.UnityLoader && UnityLoader.SystemInfo) {
          UnityLoader.SystemInfo.mobile = false;
        }

        unityInstance = UnityLoader.instantiate("unityContainer", "Build/WebKimiRun.json", { onProgress: UnityProgress });
        setupTouchControls();
        resizeUnityContainer();
        layoutUnityCanvas();
        startCanvasLayoutWatcher();
        checkOrientation();
      });

      function onFullscreenChange() {
        resizeUnityContainer();
        checkOrientation();
      }

      function requestContainerFullscreen() {
        var container = document.getElementById("unityContainer");
        if (!container) return;
        if (container.requestFullscreen)             container.requestFullscreen();
        else if (container.webkitRequestFullscreen)  container.webkitRequestFullscreen();
        else if (container.mozRequestFullScreen)     container.mozRequestFullScreen();
        else if (container.msRequestFullscreen)      container.msRequestFullscreen();
        else                                         unityInstance.SetFullscreen(1);
      }

      function checkOrientation() {
        if (!window.matchMedia("(hover: none) and (pointer: coarse)").matches) return;
        var overlay = document.getElementById("rotateOverlay");
        if (!overlay) return;
        var isPortrait = window.innerHeight > window.innerWidth;
        overlay.style.display = isPortrait ? "flex" : "none";
      }

      window.addEventListener("resize", function () { resizeUnityContainer(); checkOrientation(); });
      window.addEventListener("orientationchange", function () { resizeUnityContainer(); checkOrientation(); });
      document.addEventListener("fullscreenchange",       onFullscreenChange);
      document.addEventListener("webkitfullscreenchange", onFullscreenChange);
      document.addEventListener("mozfullscreenchange",    onFullscreenChange);
      document.addEventListener("MSFullscreenChange",     onFullscreenChange);
    </script>
  </head>
  <body>
    <div id="rotateOverlay" class="rotate-overlay" aria-live="polite">
      <div class="rotate-icon">&#8635;</div>
      <p>Bitte drehe dein Gerät ins Querformat</p>
    </div>
    <div class="webgl-content">
      <div id="unityContainer"></div>
      <div class="footer">
        <div class="webgl-logo"></div>
        <div class="fullscreen" onclick="requestContainerFullscreen()"></div>
        <div class="title">Kimi Hindernislauf</div>
      </div>
    </div>
  </body>
</html>
